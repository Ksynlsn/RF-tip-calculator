<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realfine Tip Calculator</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div id="wrapper">
    <h1>Realfine Tip Calculator</h1>

    <form id="form">
      <label>Enter Total CC Tips:</label>
      <input type="text" id="CCtips">

      <label>Enter Total Cash Tips:</label>
      <input type="text" id="cashTips">

      <label>Person 1 Hours:</label>
      <input type="number" id="shift-1" step="0.25" value="6.5">

      <label>Person 2 Hours:</label>
      <input type="number" id="shift-2" step="0.25" value="8">

      <label>Person 3 Hours:</label>
      <input type="number" id="shift-3" step="0.25" value="5.5">

      <label>Person 4 Hours:</label>
      <input type="number" id="shift-4" step="0.25" value="0">

      <hr>

      <button type="submit">Calculate Tips</button>
    </form>

    <div id="results"></div>
  </div>

  <script src="js/calculator.js"></script>
</body>
</html>
